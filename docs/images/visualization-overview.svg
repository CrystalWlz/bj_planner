<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">可视化页房源决策表示例</title>
  <desc id="desc">使用假数据展示可视化页的房源决策表、选中策略摘要和关键指标。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f9fc"/>
      <stop offset="1" stop-color="#eef4f1"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#27405f" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .card { fill: url(#hero); stroke: #dce6ef; stroke-width: 1; filter: url(#shadow); }
      .soft { fill: #f7fafc; stroke: #e1e8f0; stroke-width: 1; }
      .active { fill: #edf5ff; stroke: #7aa7d8; stroke-width: 1.5; }
      .text { fill: #213044; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .muted { fill: #667386; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .blue { fill: #315e95; }
      .green { fill: #28724f; }
      .warn { fill: #8a6118; }
      .tiny { font-size: 18px; }
      .small { font-size: 22px; }
      .mid { font-size: 28px; font-weight: 700; }
      .big { font-size: 38px; font-weight: 800; }
      .pill { fill: #eef8f2; stroke: #b9ddc9; stroke-width: 1; }
      .line { stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="text big" x="56" y="74">可视化</text>
  <text class="muted small" x="56" y="112">示例数据预览：不包含真实家庭收入、资产或成员信息</text>

  <rect class="card" x="56" y="142" width="1168" height="262" rx="14"/>
  <text class="text mid" x="86" y="194">房源决策表</text>
  <text class="muted tiny" x="928" y="194">点击房源行，下方故事线同步切换</text>

  <rect class="soft" x="86" y="220" width="1108" height="46" rx="6"/>
  <text class="muted tiny" x="112" y="250">房源与策略</text>
  <text class="muted tiny" x="334" y="250">可买时间</text>
  <text class="muted tiny" x="506" y="250">交易后现金</text>
  <text class="muted tiny" x="680" y="250">贷款压力</text>
  <text class="muted tiny" x="850" y="250">幸福指数</text>
  <text class="muted tiny" x="1030" y="250">判断</text>

  <rect class="active" x="86" y="278" width="1108" height="58" rx="8"/>
  <text class="text small" x="112" y="313" font-weight="700">示例 A 320万二手房</text>
  <text class="muted tiny" x="334" y="313">2030年5月 · 距今约3.8年</text>
  <text class="text small" x="506" y="313">18.6 万</text>
  <text class="text small" x="680" y="313">31.2%</text>
  <text class="green small" x="850" y="313" font-weight="700">7.8 / 10</text>
  <rect class="pill" x="1024" y="292" width="118" height="30" rx="8"/>
  <text class="green tiny" x="1050" y="314" font-weight="700">优先关注</text>

  <rect class="soft" x="86" y="346" width="1108" height="42" rx="8"/>
  <text class="text tiny" x="112" y="373">示例 B 420万新房</text>
  <text class="muted tiny" x="334" y="373">2032年1月 · 距今约5.5年</text>
  <text class="text tiny" x="506" y="373">9.4 万</text>
  <text class="text tiny" x="680" y="373">46.5%</text>
  <text class="warn tiny" x="850" y="373" font-weight="700">6.4 / 10</text>
  <text class="blue tiny" x="1038" y="373" font-weight="700">可比较</text>

  <rect class="card" x="56" y="430" width="1168" height="220" rx="14"/>
  <text class="text mid" x="86" y="482">选中策略</text>
  <text class="text big" x="86" y="532">微量商贷</text>
  <text class="muted small" x="86" y="572">以现金安全和较低商业贷款为目标，后端按政策约束生成贷款、账户和事件曲线。</text>

  <g transform="translate(570 472)">
    <rect class="soft" x="0" y="0" width="170" height="88" rx="10"/>
    <text class="muted tiny" x="20" y="32">可买时间</text>
    <text class="text mid" x="20" y="66">2030年5月</text>
    <rect class="soft" x="190" y="0" width="170" height="88" rx="10"/>
    <text class="muted tiny" x="210" y="32">买后现金</text>
    <text class="green mid" x="210" y="66">18.6 万</text>
    <rect class="soft" x="380" y="0" width="170" height="88" rx="10"/>
    <text class="muted tiny" x="400" y="32">月结余</text>
    <text class="green mid" x="400" y="66">1.2 万</text>
  </g>

  <g transform="translate(570 584)">
    <rect x="0" y="0" width="550" height="18" rx="9" fill="#e7edf5"/>
    <rect x="0" y="0" width="210" height="18" rx="9" fill="#4f9b74"/>
    <rect x="210" y="0" width="220" height="18" fill="#315e95"/>
    <rect x="430" y="0" width="120" height="18" rx="9" fill="#b98b2f"/>
    <text class="muted tiny" x="0" y="50">首付 / 公积金贷 / 商贷结构示意</text>
  </g>
</svg>
