[pytest]
markers =
    api: FastAPI route and persistence boundary tests.
    integration: tests that exercise TestClient, SQLite, or multiple app layers.
    domain: backend domain, strategy, policy, projection, and calculator tests.
    frontend_contract: static contracts between backend schemas and frontend source.
    architecture: architecture guardrails, module-boundary checks, and project checklist checks.
    encoding: repository encoding guard tests.
    slow: expensive full-calculation, projection, cache, or end-to-end tests.
